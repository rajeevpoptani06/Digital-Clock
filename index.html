<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A premium digital clock with Pomodoro focus timer, battery status, dynamic greetings, and 12/24-hour format toggle." />
  <title>UrbanClock — Premium Digital Time</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;700;900&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── STATUS WIDGETS (top-right corner) ─────────────────────────── -->
  <div class="status-bar" id="statusBar">
    <div class="status-widget" id="networkWidget" title="Network Status">
      <span class="status-icon" id="networkIcon">●</span>
      <span class="status-label" id="networkLabel">Online</span>
    </div>
    <div class="status-widget" id="batteryWidget" title="Battery Level">
      <span class="status-icon battery-icon">
        <svg id="batteryIconSvg" viewBox="0 0 28 14" width="28" height="14" aria-hidden="true">
          <rect x="0.5" y="0.5" width="24" height="13" rx="2.5" stroke="currentColor" stroke-width="1" fill="none"/>
          <rect x="25" y="4" width="3" height="6" rx="1" fill="currentColor"/>
          <rect id="batteryFill" x="2" y="2" width="0" height="10" rx="1.5" fill="currentColor"/>
        </svg>
      </span>
      <span class="status-label" id="batteryLabel">--%</span>
    </div>
  </div>

  <!-- ── MAIN CLOCK WRAPPER ─────────────────────────────────────────── -->
  <main class="clock-stage" id="clockStage">
    <div class="clock-card" id="clockCard">

      <!-- GREETING -->
      <p class="greeting" id="greeting">Good Evening, Hustler</p>

      <!-- TIME DISPLAY -->
      <div class="time-display" id="timeDisplay" aria-live="polite" aria-label="Current time">
        <span class="time-segment" id="hours">00</span>
        <span class="time-colon" id="colon1">:</span>
        <span class="time-segment" id="minutes">00</span>
        <span class="time-colon" id="colon2">:</span>
        <span class="time-segment" id="seconds">00</span>
        <span class="ampm-badge" id="ampmBadge">PM</span>
      </div>

      <!-- DATE -->
      <p class="date-display" id="dateDisplay">Thursday, 12 June 2025</p>

      <!-- FORMAT TOGGLE -->
      <div class="toggle-row">
        <span class="toggle-label">12h</span>
        <label class="toggle-switch" for="formatToggle" aria-label="Toggle 12 or 24 hour format">
          <input type="checkbox" id="formatToggle" />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
        <span class="toggle-label">24h</span>
      </div>

      <!-- POMODORO SECTION -->
      <div class="pomo-trigger-row">
        <button class="pomo-trigger-btn" id="pomoTriggerBtn" aria-expanded="false" aria-controls="pomodoroPanel">
          <svg class="pomo-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8" fill="none"/>
            <polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          </svg>
          Focus Mode
          <span class="pomo-arrow" id="pomoArrow">▾</span>
        </button>
      </div>

      <!-- POMODORO PANEL -->
      <section class="pomo-panel" id="pomodoroPanel" aria-hidden="true">
        <div class="pomo-inner">
          <div class="pomo-timer-ring">
            <svg class="ring-svg" viewBox="0 0 120 120" width="160" height="160" aria-hidden="true">
              <circle class="ring-bg" cx="60" cy="60" r="52"/>
              <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="52"
                stroke-dasharray="326.7" stroke-dashoffset="0"/>
            </svg>
            <div class="pomo-time-inner">
              <span class="pomo-time-text" id="pomoTimerDisplay">25:00</span>
              <span class="pomo-phase-label" id="pomoPhase">Focus</span>
            </div>
          </div>

          <div class="pomo-session-info">
            <span class="pomo-sessions-label">Sessions completed:</span>
            <span class="pomo-sessions-count" id="pomoSessions">0</span>
          </div>

          <div class="pomo-controls">
            <button class="pomo-btn pomo-start" id="pomoStartBtn" aria-label="Start focus timer">Start</button>
            <button class="pomo-btn pomo-pause" id="pomoPauseBtn" aria-label="Pause focus timer" disabled>Pause</button>
            <button class="pomo-btn pomo-reset" id="pomoResetBtn" aria-label="Reset focus timer">Reset</button>
          </div>

          <div class="pomo-mode-pills">
            <button class="pomo-pill active" id="pillFocus" data-duration="25" aria-pressed="true">Focus 25</button>
            <button class="pomo-pill" id="pillShort" data-duration="5" aria-pressed="false">Break 5</button>
            <button class="pomo-pill" id="pillLong" data-duration="15" aria-pressed="false">Long 15</button>
          </div>
        </div>
      </section>

    </div><!-- /.clock-card -->
  </main>

  <!-- ── AMBIENT PARTICLES ─────────────────────────────────────────── -->
  <canvas class="particles-canvas" id="particlesCanvas" aria-hidden="true"></canvas>

  <script src="script.js"></script>
</body>
</html>
